<div class="flex flex-col gap-3">
  <div class="flex gap-2.5">
    <div class="relative flex flex-1 items-center" [class.opacity-60]="disabled()">
      <fa-icon [icon]="faMagnifyingGlass" class="pointer-events-none absolute left-3.5 z-10 text-sm text-ink-faint" />
      <input
        class="w-full rounded-lg border-[1.5px] border-border bg-surface py-3.5 pr-11 pl-11 text-sm text-ink outline-none transition-[border-color,box-shadow] duration-200 focus:border-accent focus:shadow-[0_0_0_3px_rgba(59,130,246,0.1)] disabled:cursor-not-allowed disabled:bg-surface2 disabled:text-ink-soft"
        type="text"
        placeholder="Pregunta en lenguaje natural: ¿Cuáles son las competencias del municipio en salud?"
        [value]="queryValue()"
        [disabled]="disabled()"
        (input)="onInput($event)"
        (keyup.enter)="onSearch()"
      />
      @if (queryValue() && !disabled()) {
        <button class="absolute right-3 rounded p-1 text-sm leading-none text-ink-faint transition-colors hover:text-ink" (click)="onClear()" title="Limpiar">
          <fa-icon [icon]="faXmark" />
        </button>
      }
    </div>
    <button
      class="flex min-w-[100px] items-center justify-center gap-2 whitespace-nowrap rounded-lg bg-primary px-6 py-3 text-sm font-semibold text-white transition-colors duration-200 hover:enabled:bg-primary-light disabled:cursor-not-allowed disabled:opacity-60"
      [disabled]="disabled() || !queryValue().trim()"
      (click)="onSearch()"
    >
      @if (disabled()) {
        <span class="h-3.5 w-3.5 animate-spin rounded-full border-2 border-white/30 border-t-white"></span>
      } @else {
        Buscar
      }
    </button>
  </div>

  @if (suggestions().length && !disabled()) {
    <div class="flex flex-wrap items-center gap-2">
      <span class="text-[11px] font-semibold tracking-wide whitespace-nowrap text-ink-faint uppercase">Consultas frecuentes:</span>
      @for (s of suggestions(); track s) {
        <button class="rounded-full border border-border bg-surface px-3 py-1.5 text-left text-[11px] text-ink-soft transition-colors hover:border-accent hover:bg-accent-soft hover:text-accent" (click)="onSuggestionClick(s)">{{ s }}</button>
      }
    </div>
  }
</div>
