<div class="relative flex min-h-screen items-center justify-center overflow-hidden bg-gradient-to-br from-primary-dark via-primary to-accent px-4 py-6">
  <div class="pointer-events-none fixed -right-32 -top-32 h-[500px] w-[500px] rounded-full bg-accent/10"></div>
  <div class="pointer-events-none fixed -bottom-24 -left-24 h-[400px] w-[400px] rounded-full bg-white/5"></div>

  <div class="relative z-10 w-full max-w-[420px] animate-fade-in-up overflow-hidden rounded-[20px] bg-surface p-9 shadow-card-md">
    <!-- Hilo de regalías: acento dorado en la portada -->
    <div class="pointer-events-none absolute inset-x-0 top-0 h-1 bg-gold"></div>

    <div class="mb-7">
      <div class="mb-4 flex h-11 w-11 items-center justify-center rounded-[13px] bg-primary text-white">
        <fa-icon [icon]="faScaleBalanced" class="text-lg leading-none" />
      </div>
      <p class="text-[11px] font-bold uppercase tracking-widest text-gold">Propuestas SGR</p>
      <h2 class="font-display mt-0.5 text-2xl font-extrabold text-primary">Formula proyectos financiables con regalías</h2>
      <p class="mt-1.5 text-xs text-ink-soft">Ingresa con tu cuenta institucional para empezar.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <label class="mb-1.5 block text-xs font-semibold text-ink-soft">Correo institucional</label>
      <input
        class="mb-3.5 w-full rounded-[9px] border-[1.5px] border-border bg-surface2 px-3.5 py-2.5 font-sans text-sm text-ink outline-none transition-colors placeholder:text-ink-faint focus:border-accent focus:bg-surface"
        type="email"
        placeholder="usuario&#64;entidad.gov.co"
        formControlName="email"
        autocomplete="username"
        [class.border-danger]="form.get('email')!.invalid && form.get('email')!.touched"
      />

      <label class="mb-1.5 block text-xs font-semibold text-ink-soft">Contraseña</label>
      <div class="relative mb-3.5">
        <input
          class="w-full rounded-[9px] border-[1.5px] border-border bg-surface2 px-3.5 py-2.5 pr-11 font-sans text-sm text-ink outline-none transition-colors placeholder:text-ink-faint focus:border-accent focus:bg-surface"
          [type]="showPassword() ? 'text' : 'password'"
          placeholder="••••••••"
          formControlName="password"
          autocomplete="current-password"
          [class.border-danger]="form.get('password')!.invalid && form.get('password')!.touched"
        />
        <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-sm leading-none text-ink-faint" (click)="togglePassword()" tabindex="-1">
          <fa-icon [icon]="showPassword() ? faEyeSlash : faEye" />
        </button>
      </div>

      @if (errorMsg()) {
        <div class="mb-3.5 flex items-center gap-2 rounded-[9px] border border-danger/30 bg-danger-soft px-3.5 py-2.5 text-[13px] leading-snug text-danger">
          <fa-icon [icon]="faTriangleExclamation" />
          {{ errorMsg() }}
        </div>
      }

      <button
        type="submit"
        class="flex w-full items-center justify-center gap-2 rounded-[10px] bg-primary py-3 font-sans text-sm font-bold text-white transition-colors disabled:cursor-not-allowed disabled:opacity-65"
        [class.bg-primary-light]="loading()"
        [disabled]="form.invalid || loading()"
      >
        @if (loading()) {
          <span class="h-4 w-4 animate-spin rounded-full border-2 border-white/35 border-t-white"></span> Verificando…
        } @else {
          Ingresar al sistema →
        }
      </button>

    </form>

    <div class="mt-5 text-center text-[11px] text-ink-faint">
      <fa-icon [icon]="faLock" /> Plataforma segura · Datos cifrados · v1.0.0-beta
    </div>
  </div>
</div>
