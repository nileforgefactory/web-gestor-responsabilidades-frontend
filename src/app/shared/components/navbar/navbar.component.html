<nav class="navbar">
  <div class="navbar-brand">
    <span class="brand-icon">{{ appIcon() }}</span>
    <span class="brand-name">{{ appName() }}</span>
  </div>

  @if (items().length) {
    <div class="navbar-sep"></div>

    @for (item of items(); track item.route) {
      <a
        class="nav-item"
        [class.nav-item--highlighted]="item.highlighted"
        [routerLink]="item.route"
        routerLinkActive="nav-item--active"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        @if (item.icon) {<span class="nav-item-icon">{{ item.icon }}</span>}
        {{ item.label }}
      </a>
    }
  }

  @if (user()) {
    <div class="navbar-user">
      <div class="user-avatar">{{ initials(user()!.nombre) }}</div>
      <div class="user-info">
        <span class="user-name">{{ user()!.nombre }}</span>
        <span
          class="user-role"
          [style.background]="rolColor(user()!.rol) + '22'"
          [style.color]="rolColor(user()!.rol)"
        >{{ rolLabel(user()!.rol) }}</span>
      </div>
      <button class="logout-btn" (click)="onLogout()" title="Cerrar sesión">
        ⎋
      </button>
    </div>
  }
</nav>

<!-- Spacer so page content clears the fixed bar -->
<div class="navbar-spacer"></div>
