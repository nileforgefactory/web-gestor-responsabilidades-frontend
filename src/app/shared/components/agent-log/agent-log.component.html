<div class="scrollbar-thin overflow-y-auto rounded-lg bg-[#0D1117] px-4 py-3.5 text-xs leading-[1.75] text-[#C9D1D9]" #container [style.height]="height()">
  @for (line of logs(); track $index) {
    <div class="flex gap-2.5">
      <span class="shrink-0 text-[11px] text-[#484F58]">{{ line.time }}</span>
      <span
        [class]="{
          ok: 'text-[#3FB950]',
          info: 'text-[#58A6FF]',
          warn: 'text-[#D29922]',
          proc: 'text-[#BC8CFF]',
          error: 'text-[#FF7B72]'
        }[line.type]"
      >{{ line.message }}</span>
    </div>
  }
  @if (!logs().length) {
    <div class="italic text-[#484F58]">Esperando inicio del proceso…</div>
  }
</div>
