<div
  class="cursor-pointer select-none rounded-2xl border-2 border-dashed border-border bg-surface px-6 py-9 text-center outline-none transition-all duration-200 hover:border-accent hover:bg-accent-soft"
  [class.border-accent]="isDragging()"
  [class.bg-accent-soft]="isDragging()"
  [class.border-solid]="file() !== null"
  [class.border-success]="file() !== null"
  [class.bg-success-soft]="file() !== null"
  [class.opacity-60]="disabled()"
  [class.cursor-not-allowed]="disabled()"
  [class.pointer-events-none]="disabled()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
  (click)="onClick()"
  role="button"
  tabindex="0"
>
  <input
    #fileInput
    type="file"
    [accept]="accept()"
    [multiple]="multiple()"
    (change)="onFileChange($event)"
    class="hidden"
  />

  @if (!file()) {
    <div class="flex flex-col items-center gap-1">
      <div class="mb-1.5 text-4xl text-ink-soft"><fa-icon [icon]="faFileLines" /></div>
      <div class="text-[15px] font-bold text-ink">Arrastra tu archivo aquí</div>
      <div class="text-[13px] text-ink-soft">o haz clic para seleccionar</div>
      <div class="mt-3 flex flex-wrap justify-center gap-1.5">
        @for (fmt of ['PDF', 'DOCX', 'TXT', 'HTML']; track fmt) {
          <span class="rounded-full border border-border bg-surface2 px-2.5 py-0.5 text-[11px] font-semibold text-ink-soft">{{ fmt }}</span>
        }
      </div>
    </div>
  } @else {
    <div class="flex flex-col items-center gap-1.5">
      <div class="text-[30px] text-success"><fa-icon [icon]="faCircleCheck" /></div>
      <div class="break-all text-sm font-bold text-[#065F46]">{{ file()!.name }}</div>
      <div class="text-xs text-[#059669]">
        {{ formatSize(file()!.size) }} · Listo para procesar
      </div>
      <button class="mt-1.5 rounded-lg border border-success/40 bg-transparent px-3 py-1.5 text-xs font-semibold text-[#059669] transition-colors duration-150 hover:bg-success/10" (click)="clear($event)">
        <fa-icon [icon]="faRotate" /> Cambiar archivo
      </button>
    </div>
  }
</div>
