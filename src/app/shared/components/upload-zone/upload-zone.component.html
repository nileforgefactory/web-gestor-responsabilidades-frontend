<div
  class="upload-zone"
  [class.upload-zone--dragging]="isDragging()"
  [class.upload-zone--has-file]="file() !== null"
  [class.upload-zone--disabled]="disabled()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
  (click)="onClick()"
  role="button"
  tabindex="0"
>
  <input
    #fileInput
    type="file"
    [accept]="accept()"
    [multiple]="multiple()"
    (change)="onFileChange($event)"
    style="display: none"
  />

  @if (!file()) {
    <div class="upload-idle">
      <div class="upload-icon">📄</div>
      <div class="upload-title">Arrastra tu archivo aquí</div>
      <div class="upload-sub">o haz clic para seleccionar</div>
      <div class="upload-formats">
        @for (fmt of ['PDF', 'DOCX', 'TXT', 'HTML']; track fmt) {
          <span class="format-badge">{{ fmt }}</span>
        }
      </div>
    </div>
  } @else {
    <div class="upload-preview">
      <div class="file-check">✅</div>
      <div class="file-name">{{ file()!.name }}</div>
      <div class="file-meta">
        {{ formatSize(file()!.size) }} · Listo para procesar
      </div>
      <button class="change-btn" (click)="clear($event)">🔄 Cambiar archivo</button>
    </div>
  }
</div>
