server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — all routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed assets
    location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for index.html so new deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
